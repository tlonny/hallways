name: Release

on:
  release:
    types: [created]

env:
  RUST_BACKTRACE: "1"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-release-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo fetch --locked

      - name: Check release tag
        run: |
          package_id=$(cargo pkgid -p hallways)
          package_version=${package_id##*#}
          if [ "$RELEASE_TAG" != "$package_version" ]; then
            echo "Release tag '$RELEASE_TAG' must exactly match package version '$package_version'." >&2
            exit 1
          fi
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

  build-linux:
    needs:
      - check-release-tag
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libwayland-dev \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            wget

      - run: cargo fetch --locked

      - name: Package (Linux)
        run: cargo run --bin release linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/hallways/hallways-*-linux-*
          if-no-files-found: error

  build-windows:
    needs:
      - check-release-tag
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - run: cargo fetch --locked

      - name: Package (Windows)
        run: cargo run --bin release windows

      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/hallways/hallways-*-windows-*
          if-no-files-found: error

  release:
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/**/hallways-*-linux-*
            dist/**/hallways-*-windows-*
